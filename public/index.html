<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ecommerce DAWA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <span class="hero__eyebrow">Ecommerce</span>
          <h1>Gestión de productos</h1>
          <p>Registro, control y actualización del catálogo.</p>
        </div>
        <div class="hero__status" id="statusBadge" data-tone="neutral">Listo</div>
      </header>

      <main class="dashboard">
        <section class="metrics" id="metrics"></section>

        <section class="dashboard__content">
          <article class="panel panel--form">
            <div class="panel__header">
              <div>
                <span class="panel__kicker">Formulario</span>
                <h2 id="formTitle">Registrar producto</h2>
              </div>
              <button type="button" class="ghost-button" id="resetButton">Nuevo</button>
            </div>

            <form id="productForm" class="product-form" enctype="multipart/form-data">
              <label>
                <span>Nombre</span>
                <input type="text" id="name" name="name" maxlength="150" required />
              </label>

              <label>
                <span>Descripción</span>
                <textarea id="description" name="description" rows="4" maxlength="1200" required></textarea>
              </label>

              <div class="product-form__row">
                <label>
                  <span>Precio</span>
                  <input type="number" id="price" name="price" min="0.01" step="0.01" required />
                </label>

                <label>
                  <span>Stock</span>
                  <input type="number" id="stock" name="stock" min="0" step="1" required />
                </label>
              </div>

              <label>
                <span>Imagen por URL</span>
                <input type="url" id="imageUrl" name="image_url" placeholder="https://..." />
              </label>

              <label>
                <span>Imagen local</span>
                <input type="file" id="imageFile" name="image_file" accept="image/*" />
              </label>

              <div class="image-preview" id="imagePreviewPanel" data-state="empty">
                <img id="imagePreview" alt="Vista previa del producto" />
                <span id="imagePreviewLabel">Sin imagen seleccionada</span>
              </div>

              <button type="submit" class="primary-button" id="submitButton">Registrar</button>
            </form>
          </article>

          <article class="panel panel--table">
            <div class="panel__header">
              <div>
                <span class="panel__kicker">Inventario</span>
                <h2>Productos</h2>
              </div>
            </div>

            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="productsTableBody"></tbody>
              </table>
            </div>
          </article>
        </section>
      </main>
    </div>
  </body>
</html>
